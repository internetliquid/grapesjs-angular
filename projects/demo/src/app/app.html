<div class="toolbar">
  <button (click)="save()">Save</button>
  <button (click)="getHtml()">Get HTML</button>
  <button (click)="reset()">Reset</button>
</div>

<div class="editor-container">
  <gjs-editor
    (editorReady)="onEditorReady($event)"
    (projectSaved)="onProjectSaved($event)"
    (projectLoaded)="onProjectLoaded($event)">
  </gjs-editor>
</div>

@if (htmlOutput()) {
  <pre class="html-output">{{ htmlOutput() }}</pre>
}
